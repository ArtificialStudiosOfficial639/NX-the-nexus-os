<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro JS Piano</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a1a;
            margin: 0;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        h1 { margin-bottom: 20px; font-weight: 300; }

        .piano {
            display: flex;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border-top: 10px solid #333;
            padding: 0 10px 10px 10px;
            background: #444;
            border-radius: 5px;
        }

        .key {
            width: 60px;
            height: 220px;
            border: 1px solid #ccc;
            background: linear-gradient(to bottom, #eee 0%, #fff 100%);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 15px;
            border-radius: 0 0 5px 5px;
            user-select: none;
            color: #888;
            transition: background 0.1s, transform 0.05s;
        }

        /* Black Keys */
        .key.black {
            width: 40px;
            height: 130px;
            background: linear-gradient(to bottom, #444 0%, #000 100%);
            border: none;
            color: #555;
            margin-left: -20px;
            margin-right: -20px;
            z-index: 2;
        }

        /* Active State (Visual Feedback) */
        .key.active {
            background: #add8e6; /* Light blue */
            transform: translateY(2px);
            color: #333;
        }

        .key.black.active {
            background: #4682b4; /* Steel blue */
            color: #fff;
        }

        .hint { margin-top: 20px; color: #666; font-size: 0.9em; }
    </style>
</head>
<body>

    <h1>Web Piano</h1>

    <div class="piano">
        <div class="key" data-key="a" data-note="261.63"><span>A</span></div>
        <div class="key black" data-key="w" data-note="277.18"><span>W</span></div>
        <div class="key" data-key="s" data-note="293.66"><span>S</span></div>
        <div class="key black" data-key="e" data-note="311.13"><span>E</span></div>
        <div class="key" data-key="d" data-note="329.63"><span>D</span></div>
        <div class="key" data-key="f" data-note="349.23"><span>F</span></div>
        <div class="key black" data-key="t" data-note="369.99"><span>T</span></div>
        <div class="key" data-key="g" data-note="392.00"><span>G</span></div>
        <div class="key black" data-key="y" data-note="415.30"><span>Y</span></div>
        <div class="key" data-key="h" data-note="440.00"><span>H</span></div>
        <div class="key black" data-key="u" data-note="466.16"><span>U</span></div>
        <div class="key" data-key="j" data-note="493.88"><span>J</span></div>
        <div class="key" data-key="k" data-note="523.25"><span>K</span></div>
    </div>

    <p class="hint">Use your computer keyboard or click the keys!</p>

    <script>
       const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playNote(frequency, keyElement) {
    if (audioCtx.state === 'suspended') audioCtx.resume();

    // 1. Create Nodes
    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();

    // 2. Configure Tone (Triangle + Low Pass Filter = Warmth)
    oscillator.type = 'circle';
    oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);

    // Filter settings (Removes the "harsh" highs)
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(1000, audioCtx.currentTime); 
    filter.Q.setValueAtTime(1, audioCtx.currentTime);

    // 3. Aesthetic Volume Envelope (Soft Attack & Long Release)
    const now = audioCtx.currentTime;
    gainNode.gain.setValueAtTime(0, now);
    // Soft fade in (Attack)
    gainNode.gain.linearRampToValueAtTime(0.3, now + 0.05); 
    // Smooth fade out (Release)
    gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 2.5);

    // 4. Connect the chain
    oscillator.connect(filter);
    filter.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    // 5. Start and Stop
    oscillator.start(now);
    oscillator.stop(now + 2.5);

    // Visual Feedback
    keyElement.classList.add('active');
    setTimeout(() => keyElement.classList.remove('active'), 150);
}

// Click Logic
document.querySelectorAll('.key').forEach(key => {
    key.addEventListener('mousedown', () => {
        playNote(parseFloat(key.dataset.note), key);
    });
});

// Keyboard Logic
window.addEventListener('keydown', (e) => {
    const code = e.key.toLowerCase();
    const keyElement = document.querySelector(`.key[data-key="${code}"]`);
    if (keyElement && !e.repeat) {
        playNote(parseFloat(keyElement.dataset.note), keyElement);
    }
});
    </script>
</body>
</html>
