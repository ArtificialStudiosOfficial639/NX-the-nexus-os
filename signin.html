<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Portal | Login</title>
    <link rel="stylesheet" href="sign.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="master-container">
        <div class="brand-section">
            <div class="logo-area">
                <div class="logo-icon">V</div>
                <span>VENTURE</span>
            </div>
            <div class="quote-area">
                <p class="quote-text">"Precision is the soul of every successful enterprise."</p>
                <p class="quote-author">— Corporate Insights</p>
            </div>
            <div class="legal-minimal">© 2026 Venture Inc.</div>
        </div>

        <div class="form-section">
            <div class="login-form">
                <h2>Welcome</h2>
                <p class="subtitle">Please Enter the following details</p>

                <form id="mainLoginForm">
                    <div class="input-group">
                        <input type="email" id="email" required placeholder=" ">
                        <label for="email">Corporate Email</label>
                    </div>

                    <div class="input-group">
                        <input type="password" id="passInput" required placeholder=" ">
                        <label for="passInput">Password</label>
                        <span class="toggle-password" onclick="togglePass()">👁️</span>
                    </div>

                    <button type="submit" class="login-btn" id="loginBtn">
                        <span class="btn-text">Create the Account</span>
                        <div class="spinner"></div>
                    </button>
                </form>

                
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
